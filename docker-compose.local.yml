version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: mentrily-postgres
    environment:
      POSTGRES_USER: mentrily
      POSTGRES_PASSWORD: mentrily
      POSTGRES_DB: mentrily
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mentrily-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: mentrily-clickhouse
    ports:
      - '8123:8123'
      - '9001:9000'
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  minio:
    image: minio/minio:latest
    container_name: mentrily-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9002:9001'
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: mentrily-mailpit
    ports:
      - '1025:1025'
      - '8025:8025'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: mentrily-otel
    command: ['--config=/etc/otel-collector-config.yaml']
    ports:
      - '4317:4317'
      - '4318:4318'
    volumes:
      - ./operations/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  minio-data:

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: mentrily-postgres-test
    environment:
      POSTGRES_USER: mentrily
      POSTGRES_PASSWORD: mentrily
      POSTGRES_DB: mentrily_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mentrily -d mentrily_test']
      interval: 3s
      timeout: 3s
      retries: 20
